name: Build iOS App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install npm dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Add iOS platform
        run: |
          rm -rf ios
          npx cap add ios

      - name: Install CocoaPods
        run: |
          cd ios/App
          pod install

      - name: Build iOS for Simulator
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 15' CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build

      - name: Create IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d -path "*/Debug-iphonesimulator/*" | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/App.app
          cd Payload
          zip -r ../app.ipa ./

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: gasotrip-ipa
          path: app.ipa
